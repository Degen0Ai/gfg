<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PIANO UNIVERSE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Righteous&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}

#bg-c,#fx-c{position:fixed;inset:0;display:block}
#bg-c{z-index:1}
#fx-c{z-index:2;pointer-events:none}
#piano-c{position:fixed;z-index:5;pointer-events:none}

#ui{position:fixed;inset:0;z-index:10;pointer-events:none;font-family:'Poppins',sans-serif}

/* Top bar */
#topbar{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 24px;gap:12px;
  background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);
  pointer-events:all;
}
#title{
  font-family:'Orbitron',sans-serif;font-size:18px;
  letter-spacing:.3em;color:#fff;
  text-shadow:0 0 20px rgba(255,255,255,.3);
  flex-shrink:0;
}
#themes,#modes{display:flex;gap:5px;flex-wrap:wrap}
.tbtn,.mbtn{
  padding:5px 12px;border-radius:20px;cursor:pointer;
  font-family:'Poppins',sans-serif;font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;border:1px solid rgba(255,255,255,.15);
  background:rgba(0,0,0,.4);color:rgba(255,255,255,.45);
  transition:all .2s;user-select:none;
}
.tbtn:hover,.mbtn:hover{color:#fff;border-color:rgba(255,255,255,.4)}
.tbtn.on,.mbtn.on{color:#fff;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.35)}

/* Giant ghost note name */
#note-ghost{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Orbitron',sans-serif;font-weight:900;
  font-size:clamp(120px,25vw,240px);
  letter-spacing:-.02em;color:transparent;
  -webkit-text-stroke:1px rgba(255,255,255,.06);
  pointer-events:none;transition:opacity .15s;
  user-select:none;
}

/* Chord name */
#chord-name{
  position:absolute;top:90px;left:50%;
  transform:translateX(-50%);
  font-family:'Orbitron',sans-serif;font-size:15px;
  letter-spacing:.3em;color:rgba(255,255,255,.5);
  text-shadow:0 0 20px currentColor;
  transition:opacity .4s;text-align:center;min-width:200px;
  text-transform:uppercase;
}

/* Score area */
#score-area{
  position:absolute;top:80px;right:28px;text-align:right;
}
#score-label{font-size:9px;letter-spacing:.3em;color:rgba(255,255,255,.2)}
#score-val{
  font-family:'Orbitron',sans-serif;font-size:32px;font-weight:700;
  color:rgba(255,255,255,.5);display:block;letter-spacing:.05em;
  text-shadow:0 0 20px rgba(255,255,255,.2);
}
#streak{font-size:10px;letter-spacing:.25em;color:rgba(255,255,255,.2);margin-top:2px}

/* Bottom controls */
#ctrls{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;align-items:center;justify-content:center;
  gap:20px;padding:10px 20px;
  background:linear-gradient(to top,rgba(0,0,0,.6),transparent);
  pointer-events:all;
}
.ctrl{
  display:flex;align-items:center;gap:5px;
  font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.3);
  cursor:pointer;transition:color .2s;user-select:none;text-transform:uppercase;
}
.ctrl:hover{color:rgba(255,255,255,.6)}
.ctrl.on{color:#fff}
.kbadge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:20px;height:18px;padding:0 4px;
  border:1px solid currentColor;border-radius:3px;font-size:8px;
}

/* Waterfall canvas */
#wf-c{
  position:fixed;z-index:3;pointer-events:none;
}

/* Announce */
#announce{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;
  opacity:0;transition:opacity .3s;
}
#announce.show{opacity:1}
#ann-t{
  font-family:'Orbitron',sans-serif;font-size:clamp(40px,8vw,80px);
  font-weight:900;letter-spacing:.2em;
  -webkit-text-stroke:1.5px rgba(255,255,255,.5);color:transparent;
  text-shadow:0 0 40px rgba(200,150,255,.4);
}
#ann-s{
  font-size:12px;letter-spacing:.4em;color:rgba(255,255,255,.3);
  margin-top:10px;text-transform:uppercase;
}

/* Volume slider */
#vol-wrap{
  display:flex;align-items:center;gap:6px;
  font-size:9px;letter-spacing:.2em;color:rgba(255,255,255,.3);
}
input[type=range]{
  -webkit-appearance:none;width:60px;height:2px;
  background:rgba(255,255,255,.2);outline:none;border-radius:2px;cursor:pointer;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:10px;height:10px;
  border-radius:50%;background:rgba(255,255,255,.6);cursor:pointer;
}

/* Hit feedback (waterfall mode) */
.hit-text{
  position:fixed;z-index:15;pointer-events:none;
  font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;
  letter-spacing:.15em;animation:hitFade .6s ease-out forwards;
}
@keyframes hitFade{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(1.3)}
}
</style>
</head>
<body>

<canvas id="bg-c"></canvas>
<canvas id="fx-c"></canvas>
<canvas id="wf-c"></canvas>
<canvas id="piano-c"></canvas>

<div id="ui">
  <div id="topbar">
    <div id="title">PIANO UNIVERSE</div>
    <div id="themes">
      <div class="tbtn on" data-theme="cosmic">COSMIC</div>
      <div class="tbtn" data-theme="inferno">INFERNO</div>
      <div class="tbtn" data-theme="crystal">CRYSTAL</div>
      <div class="tbtn" data-theme="neon">NEON</div>
      <div class="tbtn" data-theme="forest">FOREST</div>
    </div>
    <div id="modes">
      <div class="mbtn on" data-mode="jam">JAM</div>
      <div class="mbtn" data-mode="waterfall">WATERFALL</div>
      <div class="mbtn" data-mode="echo">ECHO</div>
    </div>
  </div>

  <div id="note-ghost"></div>
  <div id="chord-name"></div>

  <div id="score-area">
    <div id="score-label">SCORE</div>
    <span id="score-val">0</span>
    <div id="streak"></div>
  </div>

  <div id="announce"><div id="ann-t"></div><div id="ann-s"></div></div>

  <div id="ctrls">
    <div class="ctrl" id="sustain-ctrl">
      <span class="kbadge">SHIFT</span> SUSTAIN
    </div>
    <div id="vol-wrap">
      <span>VOL</span>
      <input type="range" id="vol-slider" min="0" max="100" value="70">
    </div>
    <div class="ctrl" onclick="cycleOctave(-1)"><span class="kbadge">←</span> OCT DOWN</div>
    <div class="ctrl" onclick="cycleOctave(1)"><span class="kbadge">→</span> OCT UP</div>
    <div class="ctrl" id="arp-ctrl" onclick="toggleArp()">
      <span class="kbadge">A</span> ARPEGGIO OFF
    </div>
    <div class="ctrl" style="font-size:9px;color:rgba(255,255,255,.15);margin-left:10px">
      Z-M = OCT3 &nbsp;|&nbsp; Q-U = OCT4 &nbsp;|&nbsp; I = C5
    </div>
  </div>
</div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════════
// PIANO UNIVERSE — The Ultimate Interactive Keyboard Experience
// ═══════════════════════════════════════════════════════════════════

// ── Canvas refs ──────────────────────────────────────────────────
const bgC  = document.getElementById('bg-c');
const fxC  = document.getElementById('fx-c');
const wfC  = document.getElementById('wf-c');
const pC   = document.getElementById('piano-c');
const bgX  = bgC.getContext('2d');
const fxX  = fxC.getContext('2d');
const wfX  = wfC.getContext('2d');
const pX   = pC.getContext('2d');

let W, H, pianoL, pianoT, WKW, WKH, BKW, BKH;

// ── Notes ────────────────────────────────────────────────────────
// wi = position in white-key units; blacks are fractional
const NOTES = [
  {n:'C', o:3, b:false, ci:0,  wi:0,    key:'z'},
  {n:'C#',o:3, b:true,  ci:1,  wi:.66,  key:'s'},
  {n:'D', o:3, b:false, ci:2,  wi:1,    key:'x'},
  {n:'D#',o:3, b:true,  ci:3,  wi:1.66, key:'d'},
  {n:'E', o:3, b:false, ci:4,  wi:2,    key:'c'},
  {n:'F', o:3, b:false, ci:5,  wi:3,    key:'v'},
  {n:'F#',o:3, b:true,  ci:6,  wi:3.66, key:'g'},
  {n:'G', o:3, b:false, ci:7,  wi:4,    key:'b'},
  {n:'G#',o:3, b:true,  ci:8,  wi:4.66, key:'h'},
  {n:'A', o:3, b:false, ci:9,  wi:5,    key:'n'},
  {n:'A#',o:3, b:true,  ci:10, wi:5.66, key:'j'},
  {n:'B', o:3, b:false, ci:11, wi:6,    key:'m'},
  {n:'C', o:4, b:false, ci:0,  wi:7,    key:'q'},
  {n:'C#',o:4, b:true,  ci:1,  wi:7.66, key:'2'},
  {n:'D', o:4, b:false, ci:2,  wi:8,    key:'w'},
  {n:'D#',o:4, b:true,  ci:3,  wi:8.66, key:'3'},
  {n:'E', o:4, b:false, ci:4,  wi:9,    key:'e'},
  {n:'F', o:4, b:false, ci:5,  wi:10,   key:'r'},
  {n:'F#',o:4, b:true,  ci:6,  wi:10.66,key:'5'},
  {n:'G', o:4, b:false, ci:7,  wi:11,   key:'t'},
  {n:'G#',o:4, b:true,  ci:8,  wi:11.66,key:'6'},
  {n:'A', o:4, b:false, ci:9,  wi:12,   key:'y'},
  {n:'A#',o:4, b:true,  ci:10, wi:12.66,key:'7'},
  {n:'B', o:4, b:false, ci:11, wi:13,   key:'u'},
  {n:'C', o:5, b:false, ci:0,  wi:14,   key:'i'},
];
const NW = NOTES.length; // 25
const NUM_WHITE = 15;

// Hue per chromatic note (ROYGBV + wrap)
const NOTE_HUE = [0,30,60,90,120,150,180,210,240,270,300,330];

// Frequencies
const FREQS = NOTES.map(n=>{
  const semi = n.ci + (n.o-4)*12 - 9;
  return 440*Math.pow(2,semi/12);
});

// Keyboard map: key → note index
const KEYMAP = {};
NOTES.forEach((n,i)=>{ if(n.key) KEYMAP[n.key]=i; });

// Computed key positions (center X, top Y)
const KEY_POS = new Array(NW);

function computeLayout(){
  WKW = Math.max(32, Math.min(70, Math.floor(W*0.88/NUM_WHITE)));
  WKH = Math.min(200, Math.floor(H*0.25));
  BKW = Math.floor(WKW*0.58);
  BKH = Math.floor(WKH*0.625);
  const totalW = WKW*NUM_WHITE;
  pianoL = (W-totalW)/2;
  pianoT = H - WKH - 62;

  NOTES.forEach((n,i)=>{
    const cx = pianoL + n.wi*WKW + (n.b ? BKW/2 : WKW/2);
    KEY_POS[i] = {x:cx, top:pianoT-4};
  });

  pC.width = totalW;
  pC.height = WKH+4;
  pC.style.left = pianoL+'px';
  pC.style.top  = pianoT+'px';

  wfC.style.left = pianoL+'px';
  wfC.style.top  = '80px';
  wfC.width  = totalW;
  wfC.height = pianoT - 80;
}

function resize(){
  W = bgC.width = fxC.width  = window.innerWidth;
  H = bgC.height= fxC.height = window.innerHeight;
  computeLayout();
  redrawPiano();
}
window.addEventListener('resize', resize);

// ── Themes ───────────────────────────────────────────────────────
const THEMES = {
  cosmic:{
    keyW:'#12094A',keyB:'#06041A',keyBord:'rgba(120,80,255,.25)',
    keyBordB:'rgba(80,50,180,.3)',label:'rgba(200,160,255,.5)',labelB:'rgba(150,100,220,.6)',
    bgFrom:'#060118',bgTo:'#0A0230',
    oscType:'sine',atk:.02,dec:.25,sus:.6,rel:2.0,
    particleStyle:'star',bgStyle:'nebula',
  },
  inferno:{
    keyW:'#1A0800',keyB:'#0D0400',keyBord:'rgba(255,80,0,.25)',
    keyBordB:'rgba(180,40,0,.3)',label:'rgba(255,150,50,.5)',labelB:'rgba(220,100,20,.6)',
    bgFrom:'#0F0400',bgTo:'#1A0800',
    oscType:'sawtooth',atk:.005,dec:.08,sus:.8,rel:.3,
    particleStyle:'ember',bgStyle:'lava',
  },
  crystal:{
    keyW:'#050F1A',keyB:'#02070F',keyBord:'rgba(100,220,255,.25)',
    keyBordB:'rgba(60,180,220,.3)',label:'rgba(150,230,255,.5)',labelB:'rgba(100,200,240,.6)',
    bgFrom:'#010810',bgTo:'#051525',
    oscType:'triangle',atk:.01,dec:.5,sus:.3,rel:3.0,
    particleStyle:'shard',bgStyle:'ice',
  },
  neon:{
    keyW:'#050505',keyB:'#020202',keyBord:'rgba(0,255,0,.2)',
    keyBordB:'rgba(0,200,0,.25)',label:'rgba(0,255,100,.4)',labelB:'rgba(0,200,80,.5)',
    bgFrom:'#000000',bgTo:'#020a02',
    oscType:'square',atk:.003,dec:.03,sus:.9,rel:.1,
    particleStyle:'electric',bgStyle:'grid',
  },
  forest:{
    keyW:'#0A0F05',keyB:'#050802',keyBord:'rgba(80,180,30,.2)',
    keyBordB:'rgba(50,130,20,.25)',label:'rgba(120,220,60,.4)',labelB:'rgba(80,170,40,.5)',
    bgFrom:'#020500',bgTo:'#081005',
    oscType:'sine',atk:.04,dec:.4,sus:.5,rel:1.5,
    particleStyle:'leaf',bgStyle:'forest',
  },
};

let currentTheme = 'cosmic';
let T = THEMES.cosmic;

// ── Audio ────────────────────────────────────────────────────────
let audioCtx=null, masterGain, reverbNode, reverbGain, dryGain;
const voices = {}; // noteIdx → {osc, gain, stopped}
let sustain = false;
let volume  = 0.7;
let arpMode = false;

function initAudio(){
  if(audioCtx) return;
  audioCtx = new(window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = volume;
  masterGain.connect(audioCtx.destination);

  // Reverb (generated impulse)
  reverbNode = buildReverb(audioCtx, 2.5, 2);
  reverbGain = audioCtx.createGain(); reverbGain.gain.value = 0.4;
  dryGain    = audioCtx.createGain(); dryGain.gain.value    = 0.75;
  reverbNode.connect(reverbGain);
  reverbGain.connect(masterGain);
  dryGain.connect(masterGain);
}

function buildReverb(ctx, dur=2, decay=2){
  const len = ctx.sampleRate*dur;
  const buf = ctx.createBuffer(2,len,ctx.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=buf.getChannelData(ch);
    for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);
  }
  const conv=ctx.createConvolver(); conv.buffer=buf; return conv;
}

function playNote(ni){
  if(!audioCtx) return;
  stopNoteNow(ni);
  const freq = FREQS[ni];
  const cfg  = T;
  const now  = audioCtx.currentTime;

  const osc  = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = cfg.oscType;
  osc.frequency.setValueAtTime(freq, now);

  // Harmonics for richness
  if(cfg.oscType==='sine'){
    const osc2=audioCtx.createOscillator();
    const g2=audioCtx.createGain(); g2.gain.value=0.15;
    osc2.type='sine'; osc2.frequency.setValueAtTime(freq*2, now);
    osc2.connect(g2); g2.connect(gain);
    osc2.start(now);
    voices[ni] = voices[ni]||{}; voices[ni].osc2=osc2; voices[ni].g2=g2;
  }

  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.35, now+cfg.atk);
  gain.gain.linearRampToValueAtTime(0.35*cfg.sus, now+cfg.atk+cfg.dec);

  osc.connect(gain);
  gain.connect(dryGain);
  gain.connect(reverbNode);
  osc.start(now);
  voices[ni] = {...(voices[ni]||{}), osc, gain, held:true};
}

function releaseNote(ni){
  const v=voices[ni]; if(!v||!v.held) return;
  if(sustain){ v.held=false; return; }
  fadeNote(ni);
}

function fadeNote(ni){
  const v=voices[ni]; if(!v) return;
  const now=audioCtx.currentTime;
  const rel=T.rel||1;
  v.gain.gain.cancelScheduledValues(now);
  v.gain.gain.setValueAtTime(v.gain.gain.value,now);
  v.gain.gain.exponentialRampToValueAtTime(0.001,now+rel);
  v.osc.stop(now+rel+.05);
  if(v.osc2) v.osc2.stop(now+rel+.05);
  delete voices[ni];
}

function stopNoteNow(ni){
  const v=voices[ni]; if(!v) return;
  try{ v.osc.stop(); if(v.osc2) v.osc2.stop(); }catch(e){}
  delete voices[ni];
}

function releaseSustained(){
  Object.keys(voices).forEach(ni=>{ const v=voices[ni]; if(v&&!v.held) fadeNote(+ni); });
}

// ── Key State ────────────────────────────────────────────────────
const keyDown  = new Uint8Array(NW); // 1=pressed
const keyTime  = new Float64Array(NW); // when pressed
let octaveShift = 0;
let score = 0, scoreDisp = 0, streak = 0;
let chordTimeout = null;

function pressKey(ni, fromWaterfall=false){
  if(ni<0||ni>=NW) return;
  if(keyDown[ni] && !fromWaterfall) return;
  initAudio();
  keyDown[ni]=1; keyTime[ni]=performance.now();
  playNote(ni);
  spawnEffects(ni);
  updateNoteDisplay(ni);
  detectChord();
  redrawPiano();
  if(gameMode==='echo') handleEchoInput(ni);
  if(gameMode==='jam'){ score+=10+(streak>4?streak*2:0); streak++; updateScore(); }
}

function liftKey(ni){
  if(!keyDown[ni]) return;
  keyDown[ni]=0;
  releaseNote(ni);
  redrawPiano();
  detectChord();
  if(gameMode==='jam'){ if(Object.values(keyDown).every(v=>!v)) streak=0; }
}

// ── Piano Rendering ───────────────────────────────────────────────
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function redrawPiano(){
  pX.clearRect(0,0,pC.width,pC.height);
  const gap=1;

  // White keys
  NOTES.forEach((note,i)=>{
    if(note.b) return;
    const x=note.wi*WKW+gap;
    const w=WKW-gap*2;
    const pressed=keyDown[i];
    const hue=NOTE_HUE[note.ci];
    const dy=pressed?3:0;

    if(pressed){
      const gr=pX.createLinearGradient(x,dy,x,dy+WKH);
      gr.addColorStop(0,`hsl(${hue},90%,72%)`);
      gr.addColorStop(.35,`hsl(${hue},80%,55%)`);
      gr.addColorStop(1,`hsl(${hue},70%,22%)`);
      pX.fillStyle=gr;
      pX.shadowBlur=24; pX.shadowColor=`hsl(${hue},90%,60%)`;
    } else {
      pX.fillStyle=T.keyW;
      pX.shadowBlur=0;
    }
    roundRect(pX,x,dy,w,WKH-dy,4);
    pX.fill(); pX.shadowBlur=0;

    pX.strokeStyle=pressed?`hsl(${hue},80%,50%)`:T.keyBord;
    pX.lineWidth=1;
    pX.stroke();

    // Key label
    pX.fillStyle=pressed?'#fff':T.label;
    pX.font=`9px 'Poppins',sans-serif`;
    pX.textAlign='center';
    pX.fillText(note.key?note.key.toUpperCase():'', x+w/2, WKH-12);

    // Note name at bottom of white keys
    pX.fillStyle=pressed?`hsl(${hue},90%,75%)`:'rgba(255,255,255,.1)';
    pX.font=`bold 11px 'Poppins',sans-serif`;
    pX.fillText(note.n, x+w/2, WKH-26);
  });

  // Black keys on top
  NOTES.forEach((note,i)=>{
    if(!note.b) return;
    const x=note.wi*WKW-BKW/2;
    const pressed=keyDown[i];
    const hue=NOTE_HUE[note.ci];
    const dy=pressed?2:0;

    if(pressed){
      const gr=pX.createLinearGradient(x,dy,x,dy+BKH);
      gr.addColorStop(0,`hsl(${hue},90%,60%)`);
      gr.addColorStop(1,`hsl(${hue},70%,20%)`);
      pX.fillStyle=gr;
      pX.shadowBlur=18; pX.shadowColor=`hsl(${hue},90%,55%)`;
    } else {
      const gr=pX.createLinearGradient(x,0,x,BKH);
      gr.addColorStop(0,T.keyB);
      gr.addColorStop(1,'rgba(0,0,0,.8)');
      pX.fillStyle=gr;
      pX.shadowBlur=0;
    }
    roundRect(pX,x,dy,BKW,BKH-dy,3);
    pX.fill(); pX.shadowBlur=0;

    pX.strokeStyle=pressed?`hsl(${hue},80%,45%)`:T.keyBordB;
    pX.lineWidth=1; pX.stroke();

    if(note.key){
      pX.fillStyle=pressed?'#fff':T.labelB;
      pX.font=`7px 'Poppins',sans-serif`;
      pX.textAlign='center';
      pX.fillText(note.key.toUpperCase(), x+BKW/2, BKH-6);
    }
  });
}

// Piano click / touch
pC.addEventListener('mousedown', pianoHit);
pC.addEventListener('touchstart', e=>{ e.preventDefault(); [...e.changedTouches].forEach(t=>pianoHit({clientX:t.clientX,clientY:t.clientY})); },{passive:false});
pC.addEventListener('touchend',   e=>{ [...e.changedTouches].forEach(t=>pianoRelease({clientX:t.clientX,clientY:t.clientY})); });
pC.addEventListener('mouseup',   pianoRelease);
window.addEventListener('mouseup',()=>{ for(let i=0;i<NW;i++) if(keyDown[i]) liftKey(i); });

function pianoHit(e){
  const rect=pC.getBoundingClientRect();
  const lx=e.clientX-rect.left, ly=e.clientY-rect.top;
  // Check blacks first
  let hit=-1;
  for(let i=0;i<NW;i++){
    const n=NOTES[i]; if(!n.b) continue;
    const x=n.wi*WKW-BKW/2;
    if(lx>=x&&lx<=x+BKW&&ly>=0&&ly<=BKH){ hit=i; break; }
  }
  if(hit<0){
    for(let i=0;i<NW;i++){
      const n=NOTES[i]; if(n.b) continue;
      const x=n.wi*WKW;
      if(lx>=x&&lx<=x+WKW){ hit=i; break; }
    }
  }
  if(hit>=0) pressKey(hit);
}

function pianoRelease(e){
  const rect=pC.getBoundingClientRect();
  const lx=e.clientX-rect.left;
  for(let i=0;i<NW;i++){
    if(keyDown[i]&&!KEYMAP_REV[i]) liftKey(i); // mouse-down keys
  }
}
const KEYMAP_REV={}; NOTES.forEach((n,i)=>{ if(n.key) KEYMAP_REV[i]=n.key; });

// ── Particle Engine ──────────────────────────────────────────────
let particles = [];
let rings = [];
let columns = {}; // ni → {x, hue, alpha}
let ribbons = [];
const MAX_P = 2500;

function spawnEffects(ni){
  const pos = KEY_POS[ni];
  const hue = NOTE_HUE[NOTES[ni].ci];
  const x=pos.x, y=pos.y;

  // Light column
  columns[ni] = {x, hue, alpha:1};

  // Rise particles
  for(let i=0;i<38;i++){
    if(particles.length>=MAX_P) break;
    const a=(Math.random()-.5)*1.6 - Math.PI/2;
    const s=1.5+Math.random()*5;
    particles.push({
      type:'rise', x, y,
      vx:Math.cos(a)*s*.6+(Math.random()-.5)*.8,
      vy:-s, hue:hue+(Math.random()-0.5)*25,
      sz:1.5+Math.random()*4, life:1, dc:.007+Math.random()*.009,
      spin:0, angle:0,
    });
  }

  // Swirl ring (orbit + rise)
  for(let i=0;i<26;i++){
    if(particles.length>=MAX_P) break;
    const a=(i/26)*Math.PI*2;
    const s=2+Math.random()*3;
    particles.push({
      type:'swirl', x, y,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s-2,
      hue:(hue+50)%360, sz:2+Math.random()*3,
      life:1, dc:.01+Math.random()*.008,
      orbitA:a, orbitR:30+Math.random()*40, orbitT:0,
    });
  }

  // Geometric burst
  for(let i=0;i<10;i++){
    if(particles.length>=MAX_P) break;
    const a=(i/10)*Math.PI*2 + Math.random()*.3;
    const s=3+Math.random()*6;
    particles.push({
      type:'geo', x, y,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s-1.5,
      hue, sz:7+Math.random()*10, life:1, dc:.008,
      spin:(Math.random()-.5)*.18, angle:Math.random()*Math.PI,
      sides:3+Math.floor(Math.random()*4),
    });
  }

  // Theme-specific particles
  spawnThemeParticles(ni, hue, x, y);

  // Bloom rings
  for(let i=0;i<3;i++){
    rings.push({x, y, r:5, speed:5+i*3, maxR:180+i*80, hue, alpha:.9-(i*.2)});
  }

  // Ribbon trails
  for(let i=0;i<5;i++){
    const spread=(Math.random()-.5)*160;
    ribbons.push({
      x0:x, y0:y,
      x1:x+spread*.8+(Math.random()-.5)*80,
      y1:y-120-Math.random()*180,
      cpx:x+spread,
      cpy:y-60-Math.random()*80,
      hue, life:1, dc:.009+Math.random()*.007,
    });
  }
}

function spawnThemeParticles(ni, hue, x, y){
  const style=T.particleStyle;
  const n=20;
  for(let i=0;i<n;i++){
    if(particles.length>=MAX_P) break;
    const a=Math.random()*Math.PI*2;
    const s=Math.random()*4+1;
    let p={x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,hue,life:1,dc:.01,sz:3,spin:0,angle:0,type:'theme_'+style};
    if(style==='star'){
      p.sz=2+Math.random()*3; p.tail=[];
      p.hue=hue+(Math.random()-.5)*40;
    } else if(style==='ember'){
      p.hue=Math.random()*40; // red-orange
      p.sz=1.5+Math.random()*3;
      p.vy-=1; p.wiggle=Math.random()*.3;
    } else if(style==='shard'){
      p.sz=4+Math.random()*8;
      p.spin=(Math.random()-.5)*.3;
      p.angle=Math.random()*Math.PI;
      p.vy*=1.4;
    } else if(style==='electric'){
      p.hue=120+Math.random()*30; // green
      p.sz=2+Math.random()*4;
      p.zap=[]; p.zapT=0;
    } else if(style==='leaf'){
      p.sz=4+Math.random()*6;
      p.spin=(Math.random()-.5)*.15;
      p.angle=Math.random()*Math.PI*2;
      p.vy-=Math.random()*2;
      p.hue=80+Math.random()*60;
    }
    particles.push(p);
  }
}

// ── Update & Draw Effects ────────────────────────────────────────
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.life-=p.dc*dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    p.x+=p.vx*dt; p.y+=p.vy*dt;
    if(p.type==='rise'){ p.vy*=.985; p.vx*=.98; }
    else if(p.type==='swirl'){
      p.orbitT=(p.orbitT||0)+dt*.05;
      p.vx*=.97; p.vy*=.97;
    }
    else if(p.type==='geo'){ p.angle+=p.spin*dt; p.vy+=0.04*dt; }
    else if(p.type.startsWith('theme_')){
      const style=p.type.split('_')[1];
      if(style==='star'&&p.tail){
        p.tail.unshift({x:p.x,y:p.y}); if(p.tail.length>8)p.tail.pop();
        p.vy*=.99;
      } else if(style==='ember'){
        p.vy+=0.03*dt; p.vx+=Math.sin(Date.now()*.003+p.y)*(p.wiggle||.1)*dt;
      } else if(style==='shard'){ p.angle+=p.spin*dt; p.vy+=.04*dt; }
      else if(style==='electric'){ p.vy*=.97; p.vx*=.97; }
      else if(style==='leaf'){
        p.angle+=p.spin*dt; p.vx*=.99; p.vy+=.02*dt; p.vx+=Math.sin(p.angle*.5)*.02*dt;
      }
    }
  }
  // Rings
  for(let i=rings.length-1;i>=0;i--){
    const r=rings[i];
    r.r+=r.speed*dt; r.alpha-=.015*dt;
    if(r.r>r.maxR||r.alpha<=0) rings.splice(i,1);
  }
  // Ribbons
  for(let i=ribbons.length-1;i>=0;i--){
    ribbons[i].life-=ribbons[i].dc*dt;
    if(ribbons[i].life<=0) ribbons.splice(i,1);
  }
  // Columns
  Object.keys(columns).forEach(ni=>{
    if(!keyDown[ni]) columns[ni].alpha-=.04*dt;
    if(columns[ni].alpha<=0) delete columns[ni];
  });
}

function drawStar(ctx,x,y,r,sides,angle){
  ctx.beginPath();
  for(let i=0;i<sides*2;i++){
    const a=angle+i*Math.PI/sides;
    const rad=i%2===0?r:r*.4;
    i===0?ctx.moveTo(x+Math.cos(a)*rad,y+Math.sin(a)*rad)
         :ctx.lineTo(x+Math.cos(a)*rad,y+Math.sin(a)*rad);
  }
  ctx.closePath();
}

function drawPolygon(ctx,x,y,r,sides,angle){
  ctx.beginPath();
  for(let i=0;i<sides;i++){
    const a=angle+i*(Math.PI*2/sides);
    i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r)
         :ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
  }
  ctx.closePath();
}

function drawEffects(){
  fxX.clearRect(0,0,W,H);

  // Light columns (behind piano)
  Object.values(columns).forEach(col=>{
    if(col.alpha<=0) return;
    const x=col.x, a=col.alpha;
    const hue=col.hue;
    const grad=fxX.createLinearGradient(x,pianoT,x,pianoT-WKH*3);
    grad.addColorStop(0,`hsla(${hue},90%,65%,${a*.9})`);
    grad.addColorStop(.4,`hsla(${hue},80%,55%,${a*.5})`);
    grad.addColorStop(1,`hsla(${hue},70%,50%,0)`);
    fxX.fillStyle=grad;
    const pw=WKW*.5;
    fxX.fillRect(x-pw/2, pianoT-WKH*3, pw, WKH*3);

    // Inner bright core
    const igrad=fxX.createLinearGradient(x,pianoT,x,pianoT-WKH*2);
    igrad.addColorStop(0,`hsla(${hue},90%,85%,${a*.7})`);
    igrad.addColorStop(1,`hsla(${hue},90%,70%,0)`);
    fxX.fillStyle=igrad;
    fxX.fillRect(x-4,pianoT-WKH*2,8,WKH*2);
  });

  // Ribbons
  ribbons.forEach(rb=>{
    const a=rb.life;
    const grad=fxX.createLinearGradient(rb.x0,rb.y0,rb.x1,rb.y1);
    grad.addColorStop(0,`hsla(${rb.hue},90%,70%,${a*.8})`);
    grad.addColorStop(.5,`hsla(${(rb.hue+40)%360},85%,65%,${a*.5})`);
    grad.addColorStop(1,`hsla(${(rb.hue+80)%360},80%,60%,0)`);
    fxX.beginPath();
    fxX.moveTo(rb.x0,rb.y0);
    fxX.quadraticCurveTo(rb.cpx,rb.cpy,rb.x1,rb.y1);
    fxX.strokeStyle=grad;
    fxX.lineWidth=2.5*a;
    fxX.lineCap='round';
    fxX.stroke();
  });

  // Rings
  rings.forEach(r=>{
    fxX.beginPath();
    fxX.arc(r.x,r.y,r.r,0,Math.PI*2);
    fxX.strokeStyle=`hsla(${r.hue},90%,65%,${r.alpha})`;
    fxX.lineWidth=2*(r.alpha||1);
    fxX.stroke();
    // Inner fill on small rings
    if(r.r<30){
      fxX.fillStyle=`hsla(${r.hue},90%,70%,${r.alpha*.3})`;
      fxX.fill();
    }
  });

  // Particles
  particles.forEach(p=>{
    const a=p.life;
    if(p.type==='rise'){
      fxX.save();
      fxX.globalAlpha=a*.85;
      // Glow
      fxX.shadowBlur=p.sz*3; fxX.shadowColor=`hsl(${p.hue},90%,65%)`;
      fxX.fillStyle=`hsl(${p.hue},90%,70%)`;
      fxX.beginPath(); fxX.arc(p.x,p.y,p.sz,0,Math.PI*2); fxX.fill();
      fxX.restore();
    }
    else if(p.type==='swirl'){
      fxX.save(); fxX.globalAlpha=a*.7;
      fxX.shadowBlur=p.sz*4; fxX.shadowColor=`hsl(${p.hue},85%,65%)`;
      fxX.fillStyle=`hsl(${p.hue},85%,72%)`;
      fxX.beginPath(); fxX.arc(p.x,p.y,p.sz*.8,0,Math.PI*2); fxX.fill();
      fxX.restore();
    }
    else if(p.type==='geo'){
      fxX.save(); fxX.globalAlpha=a;
      fxX.shadowBlur=12; fxX.shadowColor=`hsl(${p.hue},90%,65%)`;
      fxX.fillStyle=`hsla(${p.hue},85%,65%,${a*.7})`;
      fxX.strokeStyle=`hsl(${p.hue},90%,75%)`;
      fxX.lineWidth=1.5;
      drawStar(fxX,p.x,p.y,p.sz,p.sides,p.angle);
      fxX.fill(); fxX.stroke();
      fxX.restore();
    }
    else if(p.type==='theme_star'){
      fxX.save(); fxX.globalAlpha=a;
      // Draw trail
      if(p.tail&&p.tail.length>1){
        for(let k=0;k<p.tail.length-1;k++){
          fxX.globalAlpha=a*(1-k/p.tail.length)*.5;
          fxX.fillStyle=`hsl(${p.hue},90%,70%)`;
          const tr=p.sz*(1-k/p.tail.length);
          fxX.beginPath(); fxX.arc(p.tail[k].x,p.tail[k].y,tr*.5,0,Math.PI*2); fxX.fill();
        }
      }
      fxX.globalAlpha=a;
      fxX.fillStyle='#fff';
      fxX.shadowBlur=p.sz*5; fxX.shadowColor=`hsl(${p.hue},90%,70%)`;
      fxX.beginPath(); fxX.arc(p.x,p.y,p.sz*.7,0,Math.PI*2); fxX.fill();
      fxX.restore();
    }
    else if(p.type==='theme_ember'){
      fxX.save(); fxX.globalAlpha=a*.9;
      fxX.shadowBlur=p.sz*3; fxX.shadowColor=`hsl(${p.hue},100%,60%)`;
      fxX.fillStyle=`hsl(${p.hue},95%,${40+a*40}%)`;
      fxX.beginPath(); fxX.arc(p.x,p.y,p.sz,0,Math.PI*2); fxX.fill();
      fxX.restore();
    }
    else if(p.type==='theme_shard'){
      fxX.save(); fxX.globalAlpha=a;
      fxX.shadowBlur=8; fxX.shadowColor=`hsl(${p.hue},80%,75%)`;
      fxX.fillStyle=`hsla(${p.hue},70%,80%,${a*.8})`;
      fxX.strokeStyle=`hsl(${p.hue},90%,85%)`;
      fxX.lineWidth=1;
      drawPolygon(fxX,p.x,p.y,p.sz,3,p.angle); fxX.fill(); fxX.stroke();
      fxX.restore();
    }
    else if(p.type==='theme_electric'){
      fxX.save(); fxX.globalAlpha=a;
      fxX.shadowBlur=10; fxX.shadowColor=`hsl(${p.hue},90%,65%)`;
      fxX.strokeStyle=`hsl(${p.hue},90%,70%)`;
      fxX.lineWidth=1.5;
      // Zigzag
      fxX.beginPath(); fxX.moveTo(p.x,p.y);
      for(let k=0;k<5;k++){
        fxX.lineTo(p.x+(Math.random()-.5)*12, p.y-k*6);
      }
      fxX.stroke();
      fxX.restore();
    }
    else if(p.type==='theme_leaf'){
      fxX.save(); fxX.globalAlpha=a*.85;
      fxX.shadowBlur=6; fxX.shadowColor=`hsl(${p.hue},80%,50%)`;
      fxX.fillStyle=`hsl(${p.hue},75%,45%)`;
      fxX.translate(p.x,p.y); fxX.rotate(p.angle);
      fxX.beginPath(); fxX.ellipse(0,0,p.sz*.4,p.sz,0,0,Math.PI*2);
      fxX.fill();
      fxX.restore();
    }
  });
}

// ── Backgrounds ───────────────────────────────────────────────────
// Per-theme star fields, moving objects
const BG_OBJ = { nebulas:[], stars:[], fireflies:[], lavaGlows:[], crystals:[], gridPulses:[] };
let bgT=0;

function initBgObjects(){
  // Stars (all themes)
  BG_OBJ.stars=Array.from({length:300},()=>({
    x:Math.random()*W, y:Math.random()*H,
    r:.3+Math.random()*1.8, a:.05+Math.random()*.5, ph:Math.random()*Math.PI*2, sp:.01+Math.random()*.04,
  }));
  // Nebula blobs (cosmic)
  BG_OBJ.nebulas=Array.from({length:8},()=>({
    x:Math.random()*W, y:Math.random()*H,
    r:80+Math.random()*200, hue:200+Math.random()*160,
    vx:(Math.random()-.5)*.08, vy:(Math.random()-.5)*.05, a:.08+Math.random()*.12,
  }));
  // Fireflies (forest)
  BG_OBJ.fireflies=Array.from({length:40},()=>({
    x:Math.random()*W, y:Math.random()*H,
    vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
    ph:Math.random()*Math.PI*2, hue:80+Math.random()*60,
  }));
  // Lava glows (inferno)
  BG_OBJ.lavaGlows=Array.from({length:12},()=>({
    x:Math.random()*W, y:H*.7+Math.random()*H*.3,
    r:60+Math.random()*120, hue:Math.random()*40, ph:Math.random()*Math.PI*2,
  }));
  // Crystal shards (crystal bg)
  BG_OBJ.crystals=Array.from({length:20},()=>({
    x:Math.random()*W, y:Math.random()*H*.6,
    h:40+Math.random()*120, hue:180+Math.random()*60, a:.08+Math.random()*.18,
    angle:(Math.random()-.5)*.3,
  }));
  // Grid lines (neon)
  BG_OBJ.gridPulses=[];
}

function drawBackground(T_){
  bgX.clearRect(0,0,W,H);
  const style=T_.bgStyle;

  // Base gradient
  const bg=bgX.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,T_.bgFrom); bg.addColorStop(1,T_.bgTo);
  bgX.fillStyle=bg; bgX.fillRect(0,0,W,H);

  if(style==='nebula'){
    // Stars
    BG_OBJ.stars.forEach(s=>{
      const tw=Math.sin(bgT*s.sp+s.ph)*.3+.7;
      bgX.globalAlpha=s.a*tw; bgX.fillStyle='#fff';
      bgX.beginPath(); bgX.arc(s.x,s.y,s.r,0,Math.PI*2); bgX.fill();
    });
    // Nebula blobs
    BG_OBJ.nebulas.forEach(nb=>{
      nb.x+=nb.vx; nb.y+=nb.vy;
      if(nb.x<-nb.r)nb.x=W+nb.r; if(nb.x>W+nb.r)nb.x=-nb.r;
      if(nb.y<-nb.r)nb.y=H+nb.r; if(nb.y>H+nb.r)nb.y=-nb.r;
      const g=bgX.createRadialGradient(nb.x,nb.y,0,nb.x,nb.y,nb.r);
      g.addColorStop(0,`hsla(${nb.hue},70%,40%,${nb.a})`);
      g.addColorStop(1,`hsla(${nb.hue},60%,30%,0)`);
      bgX.globalAlpha=1; bgX.fillStyle=g;
      bgX.beginPath(); bgX.arc(nb.x,nb.y,nb.r,0,Math.PI*2); bgX.fill();
    });
    // Pulse active-note colors into bg
    Object.values(columns).forEach(col=>{
      const g=bgX.createRadialGradient(col.x,H*.5,0,col.x,H*.5,W*.4);
      g.addColorStop(0,`hsla(${col.hue},70%,40%,${col.alpha*.06})`);
      g.addColorStop(1,'transparent');
      bgX.fillStyle=g; bgX.fillRect(0,0,W,H);
    });
  }

  else if(style==='lava'){
    // Stars (dim)
    BG_OBJ.stars.slice(0,80).forEach(s=>{
      bgX.globalAlpha=s.a*.3; bgX.fillStyle='rgba(255,150,80,.5)';
      bgX.beginPath(); bgX.arc(s.x,s.y*.5,s.r*.5,0,Math.PI*2); bgX.fill();
    });
    // Lava glows at bottom
    BG_OBJ.lavaGlows.forEach(lg=>{
      const pulse=Math.sin(bgT*.8+lg.ph)*.3+.7;
      const g=bgX.createRadialGradient(lg.x,lg.y,0,lg.x,lg.y,lg.r*pulse);
      g.addColorStop(0,`hsla(${lg.hue},100%,50%,.25)`);
      g.addColorStop(.6,`hsla(${lg.hue},90%,30%,.1)`);
      g.addColorStop(1,'transparent');
      bgX.globalAlpha=1; bgX.fillStyle=g;
      bgX.beginPath(); bgX.arc(lg.x,lg.y,lg.r*pulse,0,Math.PI*2); bgX.fill();
    });
    // Lava horizon line
    bgX.globalAlpha=.2;
    const lavaG=bgX.createLinearGradient(0,H*.75,0,H);
    lavaG.addColorStop(0,'rgba(255,80,0,0)');
    lavaG.addColorStop(.5,'rgba(255,100,0,.4)');
    lavaG.addColorStop(1,'rgba(200,40,0,.3)');
    bgX.fillStyle=lavaG; bgX.fillRect(0,H*.75,W,H*.25);
    // Active note pulses
    Object.values(columns).forEach(col=>{
      bgX.globalAlpha=col.alpha*.08;
      const g2=bgX.createRadialGradient(col.x,H,0,col.x,H,H*.5);
      g2.addColorStop(0,`hsl(${col.hue},90%,50%)`);
      g2.addColorStop(1,'transparent');
      bgX.fillStyle=g2; bgX.fillRect(0,0,W,H);
    });
  }

  else if(style==='ice'){
    // Faint stars
    BG_OBJ.stars.slice(0,150).forEach(s=>{
      bgX.globalAlpha=s.a*.4; bgX.fillStyle='rgba(180,240,255,.8)';
      bgX.beginPath(); bgX.arc(s.x,s.y,s.r*.6,0,Math.PI*2); bgX.fill();
    });
    // Crystal shards
    BG_OBJ.crystals.forEach(c=>{
      bgX.globalAlpha=c.a;
      bgX.save(); bgX.translate(c.x,c.y); bgX.rotate(c.angle);
      const g=bgX.createLinearGradient(0,0,0,c.h);
      g.addColorStop(0,`hsla(${c.hue},80%,85%,${c.a*1.5})`);
      g.addColorStop(1,`hsla(${c.hue},70%,60%,0)`);
      bgX.fillStyle=g;
      bgX.beginPath(); bgX.moveTo(0,0); bgX.lineTo(-c.h*.2,c.h); bgX.lineTo(c.h*.2,c.h); bgX.closePath();
      bgX.fill(); bgX.restore();
    });
    // Prismatic shimmer from active notes
    Object.values(columns).forEach(col=>{
      for(let h=0;h<360;h+=45){
        bgX.globalAlpha=col.alpha*.03;
        const g2=bgX.createRadialGradient(col.x,pianoT,0,col.x,pianoT,H*.6);
        g2.addColorStop(0,`hsl(${h},90%,70%)`); g2.addColorStop(1,'transparent');
        bgX.fillStyle=g2; bgX.fillRect(0,0,W,H);
      }
    });
  }

  else if(style==='grid'){
    const GRID=50;
    bgX.globalAlpha=.08; bgX.strokeStyle='#0f0';
    bgX.lineWidth=.5;
    for(let x=0;x<W;x+=GRID){
      bgX.beginPath(); bgX.moveTo(x,0); bgX.lineTo(x,H); bgX.stroke();
    }
    for(let y=0;y<H;y+=GRID){
      bgX.beginPath(); bgX.moveTo(0,y); bgX.lineTo(W,y); bgX.stroke();
    }
    // Pulse rings from active notes
    Object.values(columns).forEach(col=>{
      const pulse=bgT%2;
      bgX.globalAlpha=col.alpha*.25*(1-pulse*.5);
      bgX.strokeStyle=`hsl(${col.hue},90%,60%)`;
      bgX.lineWidth=1;
      const pr=(pulse*W*.4);
      bgX.beginPath(); bgX.arc(col.x,pianoT,pr,0,Math.PI*2);
      bgX.stroke();
    });
    // Scanlines
    bgX.globalAlpha=.04;
    for(let y=0;y<H;y+=4){
      bgX.fillStyle='rgba(0,255,80,.15)';
      bgX.fillRect(0,y,W,1);
    }
  }

  else if(style==='forest'){
    // Stars = fireflies
    BG_OBJ.fireflies.forEach(ff=>{
      ff.x+=ff.vx; ff.y+=ff.vy;
      if(ff.x<0)ff.x=W; if(ff.x>W)ff.x=0;
      if(ff.y<0)ff.y=H; if(ff.y>H)ff.y=0;
      const pulse=Math.sin(bgT*1.5+ff.ph)*.5+.5;
      bgX.globalAlpha=pulse*.7;
      const g=bgX.createRadialGradient(ff.x,ff.y,0,ff.x,ff.y,6);
      g.addColorStop(0,`hsl(${ff.hue},90%,70%)`);
      g.addColorStop(1,'transparent');
      bgX.fillStyle=g; bgX.beginPath(); bgX.arc(ff.x,ff.y,6,0,Math.PI*2); bgX.fill();
      bgX.globalAlpha=pulse*.9; bgX.fillStyle=`hsl(${ff.hue},90%,75%)`;
      bgX.beginPath(); bgX.arc(ff.x,ff.y,1.5,0,Math.PI*2); bgX.fill();
    });
    // Tree silhouettes
    bgX.globalAlpha=.25;
    bgX.fillStyle='#020800';
    [[0,H,80,H*.3],[W*.15,H,60,H*.4],[W*.3,H,90,H*.45],[W*.55,H,70,H*.38],[W*.7,H,100,H*.5],[W*.85,H,65,H*.36],[W,H,75,H*.42]].forEach(([x,y,w,h])=>{
      bgX.fillRect(x-w/2,y-h,w,h);
    });
    // Active note glow
    Object.values(columns).forEach(col=>{
      bgX.globalAlpha=col.alpha*.06;
      const g2=bgX.createRadialGradient(col.x,H*.5,0,col.x,H*.5,W*.3);
      g2.addColorStop(0,`hsl(${col.hue},70%,40%)`); g2.addColorStop(1,'transparent');
      bgX.fillStyle=g2; bgX.fillRect(0,0,W,H);
    });
  }

  bgX.globalAlpha=1;
}

// ── Note / Chord Display ─────────────────────────────────────────
function updateNoteDisplay(ni){
  const n=NOTES[ni];
  const hue=NOTE_HUE[n.ci];
  const ghost=document.getElementById('note-ghost');
  ghost.textContent=n.n+(n.o||'');
  ghost.style.color=`hsla(${hue},90%,65%,.12)`;
  ghost.style.textShadow=`0 0 40px hsla(${hue},90%,65%,.08)`;
}

const CHORD_MAP={
  '047':'Major','037':'Minor','048':'Augmented','036':'Diminished',
  '047B':'Major 7b','0479':'Dom7','03710':'Min7','04711':'Maj7',
  '057':'Sus4','027':'Sus2','0479A':'9th',
};
function detectChord(){
  const active=[];
  for(let i=0;i<NW;i++) if(keyDown[i]) active.push(NOTES[i].ci);
  const el=document.getElementById('chord-name');
  if(active.length<2){el.textContent='';return;}
  const root=Math.min(...active);
  const intervals=active.map(ci=>((ci-root+12)%12)).sort((a,b)=>a-b).join('');
  const name=CHORD_MAP[intervals];
  if(name){
    const hue=NOTE_HUE[root];
    el.textContent=`${NOTES.find(n=>n.ci===root).n} ${name}`;
    el.style.color=`hsl(${hue},90%,65%)`;
    el.style.textShadow=`0 0 20px hsl(${hue},90%,50%)`;
  } else {
    el.textContent=active.length>3?'Cluster':'';
  }
}

// ── Score ─────────────────────────────────────────────────────────
let scoreTarget=0;
function updateScore(){
  scoreTarget=score;
  const el=document.getElementById('score-val');
  el.style.textShadow=`0 0 20px rgba(255,255,255,.4)`;
  setTimeout(()=>el.style.textShadow='',300);
  document.getElementById('streak').textContent=streak>2?`STREAK ×${streak}`:'';
}

// ── Waterfall Mode ────────────────────────────────────────────────
const SONGS = {
  demo:[
    // Fur Elise simplified: E4 D#4 E4 D#4 E4 B3 D4 C4 A3...
    {ni:16,t:0},{ni:15,t:400},{ni:16,t:800},{ni:15,t:1200},
    {ni:16,t:1600},{ni:11,t:2000},{ni:14,t:2400},{ni:12,t:2800},{ni:9,t:3200},
    {ni:9,t:3600},{ni:12,t:4000},{ni:16,t:4400},{ni:19,t:4800},
    {ni:19,t:5200},{ni:16,t:5600},{ni:19,t:6000},{ni:21,t:6400},
    {ni:23,t:6800},{ni:21,t:7200},{ni:19,t:7600},
    // Ode to Joy: E4 E4 F4 G4 G4 F4 E4 D4 C4 C4 D4 E4 E4 D4 D4
    {ni:16,t:8800},{ni:16,t:9300},{ni:17,t:9800},{ni:19,t:10300},
    {ni:19,t:10800},{ni:17,t:11300},{ni:16,t:11800},{ni:14,t:12300},
    {ni:12,t:12800},{ni:12,t:13300},{ni:14,t:13800},{ni:16,t:14300},
    {ni:16,t:14900},{ni:14,t:15400},{ni:14,t:16200},
    // Twinkle: C C G G A A G
    {ni:12,t:17400},{ni:12,t:17900},{ni:19,t:18400},{ni:19,t:18900},
    {ni:21,t:19400},{ni:21,t:19900},{ni:19,t:20600},
    {ni:17,t:21400},{ni:17,t:21900},{ni:16,t:22400},{ni:16,t:22900},
    {ni:14,t:23400},{ni:14,t:23900},{ni:12,t:24600},
  ],
};
let wfBars=[]; // {ni, x, y, h, hue, time}
let wfStartT=0, wfSong=null, wfIdx=0;
const WF_SPEED=160; // px/sec
const WF_HIT_ZONE=30; // px from key top

function startWaterfall(){
  wfBars=[]; wfIdx=0;
  wfSong=SONGS.demo;
  wfStartT=performance.now();
  score=0; streak=0;
}

function updateWaterfall(dt, now){
  if(!wfSong) return;
  const elapsed=(now-wfStartT)*.001;
  const travelTime=wfC.height/WF_SPEED;

  // Spawn bars
  while(wfIdx<wfSong.length){
    const ev=wfSong[wfIdx];
    const spawnT=ev.t*.001-travelTime;
    if(elapsed>=spawnT){
      const ni=ev.ni;
      wfBars.push({
        ni, hue:NOTE_HUE[NOTES[ni].ci],
        y:-30, w: NOTES[ni].b?BKW-4:WKW-4,
        x: (NOTES[ni].b?NOTES[ni].wi*WKW-BKW/2+2:NOTES[ni].wi*WKW+2),
        h:28, life:1, hitTime:ev.t*.001,
      });
      wfIdx++;
    } else break;
  }

  // Move bars
  wfX.clearRect(0,0,wfC.width,wfC.height);
  for(let i=wfBars.length-1;i>=0;i--){
    const b=wfBars[i];
    b.y+=WF_SPEED*dt;
    const distFromKey=wfC.height-b.y-b.h;

    if(b.y>wfC.height+b.h){ wfBars.splice(i,1); continue; }

    const hue=b.hue;
    const pulse=Math.sin(Date.now()*.005)*.1+.9;

    wfX.save();
    if(distFromKey<WF_HIT_ZONE&&distFromKey>-WF_HIT_ZONE*2){
      wfX.shadowBlur=15; wfX.shadowColor=`hsl(${hue},90%,60%)`;
    }
    const gr=wfX.createLinearGradient(b.x,b.y,b.x,b.y+b.h);
    gr.addColorStop(0,`hsla(${hue},85%,60%,.95)`);
    gr.addColorStop(1,`hsla(${hue},75%,45%,.85)`);
    wfX.fillStyle=gr;
    roundRect2(wfX,b.x,b.y,b.w,b.h,4); wfX.fill();
    // Inner bright line
    wfX.fillStyle=`hsla(${hue},90%,80%,.6)`;
    roundRect2(wfX,b.x+2,b.y,b.w-4,4,2); wfX.fill();
    wfX.restore();

    // Auto-hit when bar reaches key
    if(b.y>=wfC.height-WF_HIT_ZONE&&b.y<wfC.height){
      pressKey(b.ni, true);
      score+=50; updateScore();
      showHitText(KEY_POS[b.ni].x,'AUTO',hue);
      wfBars.splice(i,1);
      setTimeout(()=>liftKey(b.ni),100);
    }
  }

  // Loop song
  if(wfIdx>=wfSong.length&&wfBars.length===0){
    wfIdx=0; wfStartT=performance.now();
  }
}

function roundRect2(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.roundRect(x,y,w,h,r);
  ctx.closePath();
}

function showHitText(x, text, hue){
  const el=document.createElement('div');
  el.className='hit-text';
  el.textContent=text;
  el.style.left=(x-30)+'px';
  el.style.top=(pianoT-60)+'px';
  el.style.color=`hsl(${hue},90%,65%)`;
  el.style.textShadow=`0 0 10px hsl(${hue},90%,50%)`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),700);
}

// ── Echo Mode ─────────────────────────────────────────────────────
let echoSeq=[], echoInput=[], echoPlaying=false, echoLevel=3;

function startEcho(){
  echoSeq=[]; echoInput=[]; echoPlaying=true;
  for(let i=0;i<echoLevel;i++) echoSeq.push(Math.floor(Math.random()*NW));
  playEchoSeq();
  showAnnounce('LISTEN!','Echo the sequence');
}

function playEchoSeq(){
  echoPlaying=true;
  let t=0;
  echoSeq.forEach((ni,i)=>{
    setTimeout(()=>{
      pressKey(ni); redrawPiano();
      setTimeout(()=>{ liftKey(ni); redrawPiano(); },300);
    }, t);
    t+=500;
  });
  setTimeout(()=>{ echoPlaying=false; showAnnounce('YOUR TURN!',''); }, t+300);
}

function handleEchoInput(ni){
  if(echoPlaying) return;
  echoInput.push(ni);
  const idx=echoInput.length-1;
  if(echoInput[idx]!==echoSeq[idx]){
    showAnnounce('WRONG!',`Score: ${score}`);
    score=0; echoLevel=3; streak=0; updateScore();
    setTimeout(startEcho, 1800);
    return;
  }
  if(echoInput.length===echoSeq.length){
    score+=echoLevel*100; streak++; echoLevel++; updateScore();
    showAnnounce('CORRECT!','+'+echoLevel*100+' pts');
    setTimeout(()=>{ echoInput=[]; startEcho(); }, 1500);
  }
}

// ── Arpeggiator ───────────────────────────────────────────────────
let arpInterval=null, arpNotes=[], arpIdx=0;
function toggleArp(){
  arpMode=!arpMode;
  const el=document.getElementById('arp-ctrl');
  el.textContent='⟨A⟩ ARPEGGIO '+(arpMode?'ON':'OFF');
  el.classList.toggle('on',arpMode);
  if(!arpMode&&arpInterval){ clearInterval(arpInterval); arpInterval=null; }
}
function startArp(ni){
  arpNotes.push(ni); if(arpInterval) return;
  arpInterval=setInterval(()=>{
    if(!arpNotes.length){ clearInterval(arpInterval); arpInterval=null; return; }
    const n=arpNotes[arpIdx%arpNotes.length]; arpIdx++;
    pressKey(n); setTimeout(()=>liftKey(n),120);
  },130);
}

// ── Game Mode ─────────────────────────────────────────────────────
let gameMode='jam';
function setMode(m){
  gameMode=m;
  document.querySelectorAll('.mbtn').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));
  wfX.clearRect(0,0,wfC.width,wfC.height);
  wfBars=[];
  if(m==='waterfall') startWaterfall();
  else if(m==='echo'){ score=0; updateScore(); startEcho(); }
}

// ── Input ─────────────────────────────────────────────────────────
const heldKeys={};
window.addEventListener('keydown',e=>{
  if(e.repeat) return;
  const k=e.key.toLowerCase();
  if(k==='shift'){ sustain=true; document.getElementById('sustain-ctrl').classList.add('on'); return; }
  if(k==='a'&&!KEYMAP[k]){ toggleArp(); return; }
  const ni=KEYMAP[k];
  if(ni===undefined) return;
  if(heldKeys[k]) return;
  heldKeys[k]=true;
  if(arpMode) startArp(ni);
  else pressKey(ni);
});

window.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(k==='shift'){
    sustain=false;
    document.getElementById('sustain-ctrl').classList.remove('on');
    releaseSustained(); return;
  }
  const ni=KEYMAP[k];
  if(ni===undefined) return;
  delete heldKeys[k];
  if(arpMode){ arpNotes=arpNotes.filter(n=>n!==ni); }
  else liftKey(ni);
});

// Theme buttons
document.querySelectorAll('.tbtn').forEach(b=>{
  b.addEventListener('click',()=>{
    currentTheme=b.dataset.theme;
    T=THEMES[currentTheme];
    document.querySelectorAll('.tbtn').forEach(x=>x.classList.toggle('on',x===b));
    // Update audio voices (rebuild reverb for crystal/cosmic)
    if(audioCtx){
      const rv=T_.rel>1.5?0.8:0.3;
      reverbGain.gain.setValueAtTime(rv,audioCtx.currentTime);
    }
    redrawPiano();
  });
});
// T_ alias to get current theme (since T might not update in closure)
const T_={get rel(){ return T.rel||1; }};

document.querySelectorAll('.mbtn').forEach(b=>{
  b.addEventListener('click',()=>setMode(b.dataset.mode));
});

// Volume
document.getElementById('vol-slider').addEventListener('input',e=>{
  volume=e.target.value/100;
  if(masterGain) masterGain.gain.setValueAtTime(volume,audioCtx.currentTime);
});

// Octave shift
function cycleOctave(dir){
  // Visual indicator only (shift displayed frequencies)
  octaveShift=Math.max(-1,Math.min(1,octaveShift+dir));
}

// Announce
function showAnnounce(title,sub){
  const el=document.getElementById('announce');
  document.getElementById('ann-t').textContent=title;
  document.getElementById('ann-s').textContent=sub;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// ── Main Loop ─────────────────────────────────────────────────────
let lastTs=0, loopT=0;
function loop(ts){
  const dt=Math.min((ts-lastTs)/16.67,3);
  lastTs=ts; bgT=ts*.001; loopT=ts;

  // Lerp score display
  scoreDisp+=(scoreTarget-scoreDisp)*.12;
  document.getElementById('score-val').textContent=Math.round(scoreDisp).toLocaleString();

  // Draw layers
  drawBackground(T);
  updateParticles(dt);
  drawEffects();

  if(gameMode==='waterfall') updateWaterfall(dt,ts);
  else wfX.clearRect(0,0,wfC.width,wfC.height);

  requestAnimationFrame(loop);
}

// ── Boot ──────────────────────────────────────────────────────────
resize();
initBgObjects();
showAnnounce('PIANO UNIVERSE','Press any key to begin');
requestAnimationFrame(loop);

// Init audio on first interaction
document.addEventListener('click',initAudio,{once:true});
document.addEventListener('keydown',initAudio,{once:true});
</script>
